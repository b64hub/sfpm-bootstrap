<template>
    <lightning-card title="Installed Artifacts" icon-name="standard:asset_object">
        <lightning-button-icon
            slot="actions"
            icon-name="utility:refresh"
            alternative-text="Refresh"
            title="Refresh"
            onclick={handleRefresh}
        ></lightning-button-icon>

        <template if:true={isLoading}>
            <div class="slds-is-relative spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="slds-p-around_medium">
                <p class="slds-text-color_error">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                    {error}
                </p>
            </div>
        </template>

        <template if:true={showContent}>
            <template if:true={hasArtifacts}>
                <div class="slds-p-bottom_xx-small badge-bar">
                    <lightning-badge label={artifactCountLabel} class="slds-m-left_medium"></lightning-badge>
                    <template if:true={historyAvailable}>
                        <lightning-badge label="History Available" class="slds-m-left_xx-small badge-history"></lightning-badge>
                    </template>
                    <template if:false={historyAvailable}>
                        <lightning-badge label="History Unavailable" class="slds-m-left_xx-small badge-no-history"></lightning-badge>
                    </template>
                </div>

                <lightning-accordion allow-multiple-sections-open>
                    <template for:each={artifactList} for:item="artifact">
                        <lightning-accordion-section
                            key={artifact.Name}
                            name={artifact.Name}
                            label={artifact.accordionLabel}
                        >
                            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                                <div class="slds-grid slds-wrap slds-gutters_x-small">
                                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-bottom_x-small">
                                        <p class="field-label">Version</p>
                                        <p class="field-value">{artifact.Version__c}</p>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-bottom_x-small">
                                        <p class="field-label">Commit</p>
                                        <p class="field-value mono-text" title={artifact.Commit_Id__c}>{artifact.commitShort}</p>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-bottom_x-small">
                                        <p class="field-label">Checksum</p>
                                        <p class="field-value mono-text" title={artifact.Checksum__c}>{artifact.checksumShort}</p>
                                    </div>
                                    <template if:true={artifact.Tag__c}>
                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-bottom_x-small">
                                            <p class="field-label">Tags</p>
                                            <p class="field-value">{artifact.Tag__c}</p>
                                        </div>
                                    </template>
                                </div>

                                <template if:true={historyAvailable}>
                                    <div class="slds-p-top_small history-section">
                                        <h3 class="slds-text-title_caps slds-p-bottom_xx-small">Deployment History</h3>
                                        <template if:true={artifact.hasHistory}>
                                            <lightning-datatable
                                                key-field="Id"
                                                data={artifact.historyRecords}
                                                columns={historyColumns}
                                                hide-checkbox-column
                                                show-row-number-column
                                            ></lightning-datatable>
                                        </template>
                                        <template if:false={artifact.hasHistory}>
                                            <p class="slds-text-color_weak slds-p-vertical_xx-small">
                                                No deployment history recorded for this artifact.
                                            </p>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </lightning-accordion-section>
                    </template>
                </lightning-accordion>
            </template>

            <template if:false={hasArtifacts}>
                <div class="slds-p-around_large slds-text-align_center">
                    <lightning-icon icon-name="utility:package" size="large" class="slds-m-bottom_small empty-icon"></lightning-icon>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        No artifacts installed in this org.
                    </p>
                </div>
            </template>

            <!-- API Limits -->
            <div class="slds-p-top_small limits-divider">
                <h3 class="slds-text-title_caps slds-p-horizontal_medium slds-p-bottom_xx-small">API Limits</h3>
                <c-sfpm-org-limits compact></c-sfpm-org-limits>
            </div>
        </template>
    </lightning-card>
</template>
