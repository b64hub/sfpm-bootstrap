<template>
  <template if:true={isLoading}>
    <div class="slds-is-relative spinner-container">
      <lightning-spinner
        alternative-text="Loading limits"
        size="small"
      ></lightning-spinner>
    </div>
  </template>

  <template if:true={error}>
    <div class="slds-p-around_small">
      <p class="slds-text-color_error slds-text-body_small">
        <lightning-icon
          icon-name="utility:error"
          size="xx-small"
          variant="error"
          class="slds-m-right_xx-small"
        ></lightning-icon>
        {error}
      </p>
    </div>
  </template>

  <template if:true={hasLimits}>
    <div class="limits-grid slds-p-around_small">
      <template for:each={displayLimits} for:item="lim">
        <div key={lim.key} class="limit-tile slds-p-around_x-small">
          <div class="slds-grid slds-grid_align-spread slds-m-bottom_xxx-small">
            <span class="limit-name" title={lim.name}>{lim.name}</span>
            <span class="limit-pct">{lim.pctLabel}</span>
          </div>
          <lightning-progress-bar
            value={lim.pct}
            size="small"
            variant={lim.variant}
          ></lightning-progress-bar>
          <div class="slds-grid slds-grid_align-spread limit-meta">
            <span>{lim.used} used</span>
            <span>{lim.max} max</span>
          </div>
        </div>
      </template>
    </div>
    <template if:true={showToggle}>
      <div class="slds-text-align_center slds-p-bottom_x-small">
        <lightning-button
          variant="base"
          label={toggleLabel}
          onclick={handleToggleAll}
        ></lightning-button>
      </div>
    </template>
  </template>
</template>
