<template>
    <lightning-card title="Environment Overview" icon-name="standard:environment_hub">
        <div slot="actions" class="slds-grid slds-grid_align-end slds-grid_vertical-align-center">
            <template if:true={contextLoaded}>
                <lightning-badge label={orgTypeBadge} class="slds-m-right_x-small badge-org-type"></lightning-badge>
            </template>
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}
            ></lightning-button-icon>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="slds-is-relative spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-p-around_medium">
                <p class="slds-text-color_error">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                    {error}
                </p>
            </div>
        </template>

        <!-- Content -->
        <template if:true={showContent}>
            <!-- Org info header -->
            <div class="slds-p-horizontal_medium slds-p-bottom_small org-header">
                <p class="slds-text-heading_small">{orgSubtitle}</p>
            </div>

            <lightning-tabset>
                <!-- Limits tab (always visible) -->
                <lightning-tab label="API Limits" value="limits" onactive={handleTabActive}>
                    <c-sfpm-org-limits compact category="org"></c-sfpm-org-limits>
                </lightning-tab>

                <!-- ═══ Production-only tabs ═══ -->

                <!-- Scratch Orgs -->
                <template if:true={showScratchOrgTab}>
                    <lightning-tab label={scratchOrgTabLabel} value="scratch" onactive={handleTabActive}>
                        <template if:true={scratchOrgSpinner}>
                            <div class="slds-is-relative spinner-container">
                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                            </div>
                        </template>
                        <template if:true={hasScratchOrgs}>
                            <lightning-datatable
                                key-field="Id"
                                data={scratchOrgs}
                                columns={scratchOrgColumns}
                                hide-checkbox-column
                                show-row-number-column
                            ></lightning-datatable>
                        </template>
                        <template if:false={hasScratchOrgs}>
                            <template if:true={scratchOrgsLoaded}>
                                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                                    No scratch org records found.
                                </div>
                            </template>
                        </template>
                    </lightning-tab>
                </template>

                <!-- Sandboxes (Tooling API) -->
                <template if:true={showSandboxTab}>
                    <lightning-tab label={sandboxTabLabel} value="sandboxes" onactive={handleTabActive}>
                        <template if:true={sandboxSpinner}>
                            <div class="slds-is-relative spinner-container">
                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                            </div>
                        </template>
                        <template if:true={hasSandboxes}>
                            <lightning-datatable
                                key-field="Id"
                                data={sandboxes}
                                columns={sandboxColumns}
                                hide-checkbox-column
                                show-row-number-column
                            ></lightning-datatable>
                        </template>
                        <template if:false={hasSandboxes}>
                            <template if:true={sandboxesLoaded}>
                                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                                    No sandbox records found.
                                </div>
                            </template>
                        </template>
                    </lightning-tab>
                </template>

                <!-- Pool Orgs -->
                <template if:true={showPoolOrgTab}>
                    <lightning-tab label={poolOrgTabLabel} value="pool" onactive={handleTabActive}>
                        <template if:true={poolOrgSpinner}>
                            <div class="slds-is-relative spinner-container">
                                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                            </div>
                        </template>
                        <template if:true={hasPoolOrgs}>
                            <lightning-datatable
                                key-field="Id"
                                data={poolOrgs}
                                columns={poolOrgColumns}
                                hide-checkbox-column
                                show-row-number-column
                            ></lightning-datatable>
                        </template>
                        <template if:false={hasPoolOrgs}>
                            <template if:true={poolOrgsLoaded}>
                                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                                    No pool org records found.
                                </div>
                            </template>
                        </template>
                    </lightning-tab>
                </template>

                <!-- ═══ Sandbox / Scratch fallback: Current Org tab ═══ -->
                <template if:true={isSandboxOrScratch}>
                    <lightning-tab label="Current Org" value="current-org" onactive={handleTabActive}>
                        <div class="slds-p-around_medium">
                            <div class="slds-grid slds-wrap slds-gutters_x-small">
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3 slds-p-bottom_small">
                                    <p class="field-label">Org Name</p>
                                    <p class="field-value">{context.orgName}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3 slds-p-bottom_small">
                                    <p class="field-label">Org Id</p>
                                    <p class="field-value mono-text">{context.orgId}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3 slds-p-bottom_small">
                                    <p class="field-label">Org Type</p>
                                    <p class="field-value">{context.orgType}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3 slds-p-bottom_small">
                                    <p class="field-label">Instance</p>
                                    <p class="field-value">{context.instanceName}</p>
                                </div>
                            </div>
                        </div>
                    </lightning-tab>
                </template>
            </lightning-tabset>
        </template>
    </lightning-card>
</template>
